version: "3.9"
services:
  doc-review:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CHROMA_PATH=/data/chroma
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - SEARCH_ENABLED=true
    volumes:
      - ./storage:/app/storage
      - chroma_data:/data/chroma
volumes:
  chroma_data:
